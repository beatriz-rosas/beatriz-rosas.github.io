<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Métricas académicas</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gs-card">
    <div class="gs-head">
      <div class="gs-title">Citado por</div>
<a class="gs-cta" id="gsLink" href="https://scholar.google.com/citations?user=zyxmL44AAAAJ&hl=en" target="_blank" rel="noopener">VER TODO</a>    </div>

    <table class="gs-table">
      <thead>
        <tr>
          <th></th>
          <th>Total</th>
          <th>Desde 2021</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Citas</td>
          <td id="gsCitTotal">-</td>
          <td id="gsCitSince">-</td>
        </tr>
        <tr>
          <td>Índice h</td>
          <td id="gsHTotal">-</td>
          <td id="gsHSince">-</td>
        </tr>
        <tr>
          <td>Índice i10</td>
          <td id="gsI10Total">-</td>
          <td id="gsI10Since">-</td>
        </tr>
      </tbody>
    </table>

<div class="gs-chart-area">
  <div class="gs-plot">
    <div class="gs-grid gs-grid-top"></div>
    <div class="gs-grid gs-grid-mid"></div>
    <div class="gs-grid gs-grid-bottom"></div>

    <div class="gs-ylabels">
      <span id="yTop">22</span>
      <span id="yMid">11</span>
      <span id="yBottom">0</span>
    </div>

    <div class="bars" id="bars"></div>
  </div>

  <div class="years" id="years"></div>
  <div id="debug" style="margin-top:10px; font-size:12px; color:#b00020;"></div>
</div>

  <script>
    fetch('data/scholar.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('No se pudo cargar scholar.json');
        }
        return response.json();
      })
      .then(data => {
        const max = Math.max(...data.citations_by_year.map(d => d.cites), 1);

// Para que el eje se vea como Scholar:
// arriba = máximo redondeado
// medio = mitad redondeada
const yTopValue = Math.ceil(max / 2) * 2; 
const yMidValue = Math.round(yTopValue / 2);

document.getElementById('yTop').textContent = yTopValue;
document.getElementById('yMid').textContent = yMidValue;
document.getElementById('yBottom').textContent = 0;

      data.citations_by_year.forEach(d => {
  const barWrap = document.createElement('div');
  barWrap.className = 'bar-wrap';

  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.height = `${(d.cites / yTopValue) * 180}px`;
  bar.title = `${d.year}: ${d.cites} citas`;

  barWrap.appendChild(bar);
  bars.appendChild(barWrap);

  const year = document.createElement('div');
  year.className = 'year';
  year.textContent = d.year;
  years.appendChild(year);
});
      })
      .catch(error => {
        console.error('Error:', error);
      });
  </script>
</body>
</html>
