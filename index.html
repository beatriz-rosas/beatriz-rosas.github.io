<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Métricas académicas</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="gs-card">
    <div class="gs-head">
      <div class="gs-title">Citado por</div>
      <a class="gs-cta" id="gsLink" href="#" target="_blank" rel="noopener">VER TODO</a>
    </div>

    <table class="gs-table">
      <thead>
        <tr>
          <th></th>
          <th>Total</th>
          <th>Desde 2021</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Citas</td>
          <td id="gsCitTotal">—</td>
          <td id="gsCitSince">—</td>
        </tr>
        <tr>
          <td>Índice h</td>
          <td id="gsHTotal">—</td>
          <td id="gsHSince">—</td>
        </tr>
        <tr>
          <td>Índice i10</td>
          <td id="gsI10Total">—</td>
          <td id="gsI10Since">—</td>
        </tr>
      </tbody>
    </table>

    <div class="gs-chart-area">
      <div class="gs-plot">
        <div class="gs-grid gs-grid-top"></div>
        <div class="gs-grid gs-grid-mid"></div>
        <div class="gs-grid gs-grid-bottom"></div>

        <div class="gs-ylabels">
          <span id="yTop">0</span>
          <span id="yMid">0</span>
          <span id="yBottom">0</span>
        </div>

        <div class="bars" id="bars"></div>
      </div>

      <div class="years" id="years"></div>
    </div>

    <div id="debug"></div>
  </div>

  <script>
    fetch('./data/scholar.json')
      .then(response => {
        if (!response.ok) {
          throw new Error('No se pudo cargar data/scholar.json. Status: ' + response.status);
        }
        return response.json();
      })
      .then(data => {
        document.getElementById('debug').textContent = '';

        document.getElementById('gsLink').href = data.profile_url || '#';

        document.getElementById('gsCitTotal').textContent = data.citations?.total ?? '—';
        document.getElementById('gsCitSince').textContent = data.citations?.since2021 ?? '—';

        document.getElementById('gsHTotal').textContent = data.h_index?.total ?? '—';
        document.getElementById('gsHSince').textContent = data.h_index?.since2021 ?? '—';

        document.getElementById('gsI10Total').textContent = data.i10_index?.total ?? '—';
        document.getElementById('gsI10Since').textContent = data.i10_index?.since2021 ?? '—';

        const bars = document.getElementById('bars');
        const years = document.getElementById('years');

        bars.innerHTML = '';
        years.innerHTML = '';

        const series = data.citations_by_year || [];
        const max = Math.max(...series.map(d => d.cites), 1);

        const yTopValue = Math.ceil(max / 2) * 2;
        const yMidValue = yTopValue / 2;

        document.getElementById('yTop').textContent = yTopValue;
        document.getElementById('yMid').textContent = yMidValue;
        document.getElementById('yBottom').textContent = 0;

        series.forEach(d => {
          const barWrap = document.createElement('div');
          barWrap.className = 'bar-wrap';

          const bar = document.createElement('div');
          bar.className = 'bar';
          bar.style.height = `${(d.cites / yTopValue) * 180}px`;
          bar.title = `${d.year}: ${d.cites} citas`;

          barWrap.appendChild(bar);
          bars.appendChild(barWrap);

          const year = document.createElement('div');
          year.className = 'year';
          year.textContent = d.year;
          years.appendChild(year);
        });
      })
      .catch(error => {
        console.error(error);
        document.getElementById('debug').textContent = error.message;
      });
  </script>
</body>
</html>
